name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            artifact: fast_copy
          - os: macos-latest
            name: macos-arm64
            artifact: fast_copy
          - os: windows-latest
            name: windows
            artifact: fast_copy.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build executable
        run: python build.py

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          if [ "${{ matrix.name }}" = "windows" ]; then
            mv dist/fast_copy.exe dist/fast_copy-${{ matrix.name }}.exe
          else
            mv dist/fast_copy dist/fast_copy-${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast_copy-${{ matrix.name }}
          path: dist/fast_copy-${{ matrix.name }}*

  build-macos-intel:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install x86_64 Python via Homebrew under Rosetta
        run: |
          # Install x86_64 Homebrew to /usr/local
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          # Install x86_64 Python (don't link — avoid conflict with ARM brew)
          arch -x86_64 /usr/local/bin/brew install python@3.11 || true
          # Find the x86_64 python binary
          X86_PYTHON="$(find /usr/local/Cellar/python@3.11 -name 'python3.11' -type f | head -1)"
          echo "X86_PYTHON=$X86_PYTHON" >> $GITHUB_ENV
          # Verify it's x86_64
          arch -x86_64 "$X86_PYTHON" -c "import platform; print(f'Python arch: {platform.machine()}')"

      - name: Build x86_64 executable
        run: |
          arch -x86_64 "$X86_PYTHON" -m pip install pyinstaller xxhash paramiko --quiet --disable-pip-version-check
          arch -x86_64 "$X86_PYTHON" -m PyInstaller --onefile --name fast_copy --clean --noupx --console --hidden-import=xxhash --hidden-import=paramiko fast_copy.py
          file dist/fast_copy

      - name: Rename binary
        run: mv dist/fast_copy dist/fast_copy-macos-intel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast_copy-macos-intel
          path: dist/fast_copy-macos-intel

  release:
    needs: [build, build-macos-intel]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Upload each binary
          for f in artifacts/fast_copy-*/*; do
            echo "Uploading $f ..."
            gh release upload "$tag" "$f" --clobber
          done
          # Also upload the Python script
          gh release upload "$tag" fast_copy.py --clobber
