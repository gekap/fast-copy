name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            artifact: fast_copy
          - os: macos-latest
            name: macos-arm64
            artifact: fast_copy
          - os: windows-latest
            name: windows
            artifact: fast_copy.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build executable
        run: python build.py
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          if [ "${{ matrix.name }}" = "windows" ]; then
            mv dist/fast_copy.exe dist/fast_copy-${{ matrix.name }}.exe
          else
            mv dist/fast_copy dist/fast_copy-${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast_copy-${{ matrix.name }}
          path: dist/fast_copy-${{ matrix.name }}*

  build-macos-intel:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install x86_64 Python via python.org universal installer
        run: |
          # Download python.org universal2 installer (supports both arm64 and x86_64, targets macOS 10.9+)
          curl -fsSL https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg -o python-installer.pkg
          sudo installer -pkg python-installer.pkg -target /
          # The universal installer puts python at /usr/local/bin/python3.11
          X86_PYTHON="/usr/local/bin/python3.11"
          echo "X86_PYTHON=$X86_PYTHON" >> $GITHUB_ENV
          # Verify it works under x86_64
          arch -x86_64 "$X86_PYTHON" -c "import platform; print(f'Python arch: {platform.machine()}')"

      - name: Build x86_64 executable
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
        run: |
          arch -x86_64 "$X86_PYTHON" -m pip install pyinstaller xxhash paramiko --quiet --disable-pip-version-check
          arch -x86_64 "$X86_PYTHON" -m PyInstaller --onefile --name fast_copy --clean --noupx --console --hidden-import=xxhash --hidden-import=paramiko fast_copy.py
          file dist/fast_copy

      - name: Rename binary
        run: mv dist/fast_copy dist/fast_copy-macos-intel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast_copy-macos-intel
          path: dist/fast_copy-macos-intel

  release:
    needs: [build, build-macos-intel]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Upload each binary
          for f in artifacts/fast_copy-*/*; do
            echo "Uploading $f ..."
            gh release upload "$tag" "$f" --clobber
          done
          # Also upload the Python script
          gh release upload "$tag" fast_copy.py --clobber
